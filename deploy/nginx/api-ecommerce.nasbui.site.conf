# Nginx reverse proxy for api-ecommerce.nasbui.site
# Install on VPS:
#   sudo cp deploy/nginx/api-ecommerce.nasbui.site.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/api-ecommerce.nasbui.site.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then SSL:
#   sudo certbot --nginx -d api-ecommerce.nasbui.site

server {
    listen 80;
    listen [::]:80;
    server_name api-ecommerce.nasbui.site;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3055;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
