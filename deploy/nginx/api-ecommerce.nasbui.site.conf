# LEGACY — host Nginx config
# This project now uses Nginx Proxy Manager (NPM) by default.
# See docs/DEPLOY.md — do NOT run host nginx while NPM owns :80/:443.
#
# Only use this file if you stop NPM and switch back to system Nginx + Certbot.

server {
    listen 80;
    listen [::]:80;
    server_name api-ecommerce.nasbui.site;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3055;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
