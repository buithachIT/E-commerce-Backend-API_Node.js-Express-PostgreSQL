name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    name: Tests, syntax & Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test

      - name: Syntax check
        run: |
          node --check server.js
          find src -name "*.js" -print0 | xargs -0 -n1 node --check

      - name: Build Docker image
        run: docker build -f dockerfile -t ecommerce-api:ci .
