name: Deploy production

on:
  push:
    branches: [main, master]
  workflow_dispatch: # manual run from GitHub Actions UI

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # Wait for CI on the same commit when both run (optional safety)
    needs: []

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_PATH="${{ secrets.VPS_APP_PATH }}"
            echo ">>> APP_PATH=$APP_PATH"
            echo ">>> whoami=$(whoami) pwd_before=$(pwd)"

            if [ -z "$APP_PATH" ]; then
              echo "ERROR: VPS_APP_PATH secret is empty"
              exit 1
            fi

            cd "$APP_PATH"
            echo ">>> pwd=$(pwd)"
            echo ">>> remote=$(git remote -v | head -n 2)"
            echo ">>> BEFORE=$(git rev-parse --short HEAD) branch=$(git rev-parse --abbrev-ref HEAD)"

            git fetch origin --prune
            git checkout main 2>/dev/null || git checkout master
            git reset --hard origin/main 2>/dev/null || git reset --hard origin/master

            echo ">>> AFTER=$(git rev-parse --short HEAD) ($(git log -1 --oneline))"

            docker compose --env-file .env -f docker-compose.prod.yml up -d --build

            sleep 5
            curl -fsS http://127.0.0.1:3055/health
            echo
            echo ">>> Deploy OK"

